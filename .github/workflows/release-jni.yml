name: Release JNI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.2.0)'
        required: true
        type: string

jobs:
  build-jni:
    strategy:
      matrix:
        include:
          - os: linux-ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libzerobus_jni.so
            artifact_dir: linux-x86-64
          - os: windows-server-latest
            target: x86_64-pc-windows-msvc
            artifact: zerobus_jni.dll
            artifact_dir: windows-x86-64

    runs-on:
      group: databricks-protected-runner-group
      labels: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build JNI library
        run: cargo build --release -p zerobus-jni --target ${{ matrix.target }}

      - name: Create artifact directory
        run: mkdir -p artifacts/${{ matrix.artifact_dir }}

      - name: Copy artifact (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ matrix.artifact }} artifacts/${{ matrix.artifact_dir }}/

      - name: Copy artifact (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\${{ matrix.artifact }} artifacts\${{ matrix.artifact_dir }}\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jni-${{ matrix.artifact_dir }}
          path: artifacts/${{ matrix.artifact_dir }}

  package:
    needs: build-jni
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: native
          pattern: jni-*
          merge-multiple: false

      - name: Organize artifacts
        run: |
          mkdir -p release/native
          for dir in native/jni-*/; do
            platform=$(basename "$dir" | sed 's/jni-//')
            mkdir -p "release/native/$platform"
            cp "$dir"/* "release/native/$platform/"
          done
          ls -laR release/

      - name: Create release archive
        run: |
          cd release
          tar -czvf ../zerobus-jni-${{ inputs.version }}.tar.gz native/
          cd ..
          ls -la

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: zerobus-jni-${{ inputs.version }}
          path: zerobus-jni-${{ inputs.version }}.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jni-v${{ inputs.version }}
          name: JNI Libraries v${{ inputs.version }}
          body: |
            Native JNI libraries for zerobus-sdk-java v${{ inputs.version }}

            Platforms included:
            - linux-x86-64
            - windows-x86-64
          files: zerobus-jni-${{ inputs.version }}.tar.gz
