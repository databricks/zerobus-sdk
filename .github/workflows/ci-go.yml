name: Go CI

on:
  workflow_call:

jobs:
  fmt:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format all files
        run: make fmt

      - name: Fail on differences
        run: git diff --exit-code

  lint:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Lint code
        run: make lint

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [linux-ubuntu-latest, windows-server-latest]
    runs-on:
      group: databricks-protected-runner-group
      labels: ${{ matrix.os }}
    defaults:
      run:
        working-directory: go
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Unshallow
        run: git fetch --prune --unshallow

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Build Rust FFI
        run: make build-rust

      - name: Build Go SDK
        run: make build-go

      - name: Run tests
        run: make test

      - name: Build examples
        run: make examples

  user-experience:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux-ubuntu-latest
            lib: lib/linux_amd64/libzerobus_ffi.a
          - os: windows-server-latest
            lib: lib/windows_amd64/libzerobus_ffi.a
    runs-on:
      group: databricks-protected-runner-group
      labels: ${{ matrix.os }}
    defaults:
      run:
        working-directory: go
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: dtolnay/rust-toolchain@stable

      - name: Run go generate (user step 1)
        run: go generate -v

      - name: Verify library built
        run: test -f ${{ matrix.lib }}

      - name: Test go build works (user step 2)
        run: go build -v

      - name: Test JSON single example builds
        working-directory: go/examples/json/single
        run: go build -v

      - name: Test JSON batch example builds
        working-directory: go/examples/json/batch
        run: go build -v

      - name: Test Proto single example builds
        working-directory: go/examples/proto/single
        run: go build -v

      - name: Test Proto batch example builds
        working-directory: go/examples/proto/batch
        run: go build -v
