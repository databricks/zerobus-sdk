name: Feature Request
description: Suggest a new feature or improvement for a Zerobus Ingest SDK.
title: "[FEATURE] "
labels: []
body:
  - type: dropdown
    id: sdk
    attributes:
      label: SDK
      description: Which SDK is this feature request for?
      options:
        - Rust
        - All / General
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: A clear and concise description of what the problem is.
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, references or screenshots about the feature request here.
