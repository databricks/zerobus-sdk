name: SDK Issue
description: Report a bug or issue with a Zerobus Ingest SDK.
title: "[ISSUE] "
labels: []
body:
  - type: dropdown
    id: sdk
    attributes:
      label: SDK
      description: Which SDK is this issue for?
      options:
        - Rust
        - All / General
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK Version
      description: Which version of the SDK are you using?
      placeholder: "e.g. 0.5.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 14, Ubuntu 22.04, Windows 11"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: A minimal code sample demonstrating the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: regression
    attributes:
      label: Is it a regression?
      description: Did this work in a previous version of the SDK?
      options:
        - "No"
        - "Yes"
        - Not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug Logs
      description: The SDK logs helpful debugging information when debug logging is enabled. Paste any relevant log output here.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
