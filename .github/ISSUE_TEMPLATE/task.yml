name: Task
description: Internal task or work item for a Zerobus SDK.
type: Task
body:
  - type: dropdown
    id: sdk
    attributes:
      label: SDK
      description: Which SDK is this task for?
      options:
        - Rust
        - TypeScript
        - Java
        - Python
        - Go
        - All
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the task.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear description of the solution.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the task here.
